version: "3.9"

services:

  # ========================
  # MYSQL DATABASE
  # ========================
  munidm_db:
    image: mysql:8.0
    container_name: munidm_db
    restart: always

    command: --default-authentication-plugin=mysql_native_password

    environment:
      MYSQL_ROOT_PASSWORD: Munidm91!!!
      MYSQL_DATABASE: munidm_db
      MYSQL_USER: munidm
      MYSQL_PASSWORD: Munidm91!!!

    ports:
      - "3307:3306"

    volumes:
      - munidm_mysql_data:/var/lib/mysql

    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 5s
      timeout: 5s
      retries: 10

    networks:
      - shared-network


  # ========================
  # BACKEND API
  # ========================
  munidm_server:
    build: ./server
    image: abdulrahman939291/server
    container_name: munidm_server
    restart: always

    env_file:
      - ./server/.env

    environment:
      MYSQL_HOST: munidm_db
      MYSQL_USER: munidm
      MYSQL_PASSWORD: Munidm91!!!
      MYSQL_DATABASE: munidm_db

    ports:
      - "3005:3000"

    depends_on:
      munidm_db:
        condition: service_healthy

    networks:
      - shared-network


  # ========================
  # FRONTEND CLIENT
  # ========================
  munidm_client:
    build: ./client
    image: abdulrahman939291/client
    container_name: munidm_client
    restart: always

    ports:
      - "8080:80"

    environment:
      VITE_BACKEND_URL: https://api.munidm.fr

    depends_on:
      - munidm_server

    networks:
      - shared-network


  # ========================
  # PHPMYADMIN
  # ========================
  munidm_phpmyadmin:
    image: phpmyadmin/phpmyadmin
    container_name: munidm_phpmyadmin
    restart: always

    ports:
      - "8089:80"

    environment:
      PMA_HOST: munidm_db
      MYSQL_ROOT_PASSWORD: Munidm91!!!

    depends_on:
      - munidm_db

    networks:
      - shared-network


volumes:
  munidm_mysql_data:


networks:
  shared-network:
    external: true